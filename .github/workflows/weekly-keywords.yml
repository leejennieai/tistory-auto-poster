name: Weekly Keyword Collection

on:
  schedule:
    # 매주 월요일 한국시간 오전 3시 (UTC 일요일 18:00)
    - cron: '0 18 * * 0'
  workflow_dispatch: # 수동 실행

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect keywords from Naver
        working-directory: src
        env:
          NAVER_AD_API_LICENSE: ${{ secrets.NAVER_AD_API_LICENSE }}
          NAVER_AD_API_SECRET: ${{ secrets.NAVER_AD_API_SECRET }}
          NAVER_AD_CUSTOMER_ID: ${{ secrets.NAVER_AD_CUSTOMER_ID }}
        run: python keyword_collector.py

      - name: Commit new keywords
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords/
          git diff --staged --quiet || git commit -m "chore: add new keywords from Naver [skip ci]"
          git push
