name: Tistory Session Keepalive

on:
  # cron 비활성화: daily-post 워크플로가 발행 직전 세션 체크 + 자동 로그인 수행.
  # 이 워크플로는 디버깅/수동 갱신 용도로만 유지 (workflow_dispatch).
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Refresh Tistory session
        working-directory: src
        env:
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
          KAKAO_EMAIL: ${{ secrets.KAKAO_EMAIL }}
          KAKAO_PASSWORD: ${{ secrets.KAKAO_PASSWORD }}
        run: python session_keepalive.py

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-debug
          path: debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit refreshed auth_state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auth_state.json
          git diff --staged --quiet || git commit -m "chore: refresh tistory session [skip ci]"
          git push
