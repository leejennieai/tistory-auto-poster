name: Daily Tistory Post

on:
  schedule:
    # 매일 한국시간 오전 6시 (UTC 21:00 전날)
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      immediate:
        description: '대기 없이 즉시 발행'
        type: boolean
        default: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 600  # 최대 10시간 (랜덤 딜레이 포함)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Restore auth_state from cache
        id: restore-auth
        uses: actions/cache/restore@v4
        with:
          path: auth_state.json
          key: tistory-session-${{ github.run_id }}
          restore-keys: |
            tistory-session-

      - name: Bootstrap auth_state from secret (cache miss only)
        if: steps.restore-auth.outputs.cache-matched-key == ''
        env:
          AUTH_STATE_B64: ${{ secrets.AUTH_STATE_B64 }}
        run: |
          if [ -z "$AUTH_STATE_B64" ]; then
            echo "[ERROR] cache miss + AUTH_STATE_B64 secret 없음"
            exit 1
          fi
          echo "$AUTH_STATE_B64" | base64 -d > auth_state.json
          echo "[OK] AUTH_STATE_B64 secret으로 부트스트랩"

      - name: Generate and publish posts
        working-directory: src
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
          TISTORY_CATEGORY: ${{ secrets.TISTORY_CATEGORY }}
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          IMMEDIATE: ${{ github.event.inputs.immediate || 'false' }}
        run: python daily_runner.py

      - name: Save auth_state to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: auth_state.json
          key: tistory-session-${{ github.run_id }}

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-post-debug
          path: debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: Commit keyword usage update
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keywords/
          if git diff --staged --quiet; then
            echo "변경 사항 없음"
            exit 0
          fi
          git commit -m "chore: mark used keyword [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            git push && { echo "[OK] push 성공 ($i회 시도)"; exit 0; }
            echo "[WARN] push 실패, 재시도 ($i/5)"
            sleep $((RANDOM % 10 + 5))
          done
          echo "[ERROR] 5회 시도 모두 실패"
          exit 1
