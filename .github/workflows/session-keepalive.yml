name: Tistory Session Keepalive

on:
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Restore auth_state from cache
        id: restore-auth
        uses: actions/cache/restore@v4
        with:
          path: auth_state.json
          key: tistory-session-${{ github.run_id }}
          restore-keys: |
            tistory-session-

      - name: Bootstrap auth_state from secret (cache miss only)
        if: steps.restore-auth.outputs.cache-matched-key == ''
        env:
          AUTH_STATE_B64: ${{ secrets.AUTH_STATE_B64 }}
        run: |
          if [ -z "$AUTH_STATE_B64" ]; then
            echo "[ERROR] cache miss + AUTH_STATE_B64 secret 없음"
            echo "→ 로컬에서 base64 -i auth_state.json | pbcopy 후 GitHub Secret 등록 필요"
            exit 1
          fi
          echo "$AUTH_STATE_B64" | base64 -d > auth_state.json
          echo "[OK] AUTH_STATE_B64 secret으로 부트스트랩"

      - name: Refresh Tistory session
        working-directory: src
        env:
          TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
        run: python session_keepalive.py

      - name: Save auth_state to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: auth_state.json
          key: tistory-session-${{ github.run_id }}

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: keepalive-debug
          path: debug/
          retention-days: 7
          if-no-files-found: ignore
